name: macIsland
options:
  bundleIdPrefix: com.ayushman
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "15.0"

targets:
  macIsland:
    type: application
    platform: macOS
    sources:
      - path: macIsland
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ayushman.macIsland
        INFOPLIST_KEY_LSUIElement: true
        INFOPLIST_KEY_CFBundleDisplayName: macIsland
        PRODUCT_NAME: macIsland
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_NSAppleEventsUsageDescription: "macIsland needs to control Spotify to fetch track info and playback state."
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: false
        SWIFT_EMIT_LOC_STRINGS: true
    entitlements:
      path: macIsland/Resources/macIsland.entitlements
      properties:
        com.apple.security.app-sandbox: false

  macIslandTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: macIslandTests
        type: group
    dependencies:
      - target: macIsland
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ayushman.macIslandTests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/macIsland.app/Contents/MacOS/macIsland"
        BUNDLE_LOADER: "$(TEST_HOST)"
